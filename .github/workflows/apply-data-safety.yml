name: Apply data safety changes

on:
  push:
    branches:
      - fix/data-safety-validation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/data-safety-validation
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply focused changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected text not found in {path}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1))

          # Remove unsafe cross-franchise title guesses.
          replace(
              'server/known-media.js',
              "export const knownTitleCorrections = new Map([\n  ['tomadachi game', 'Tomodachi Game'],\n  ['2025 superman', 'Superman 2025'],\n  ['2025 spuierman', 'Superman 2025'],\n  ['2025 spiderman', 'Superman 2025'],\n])",
              "export const knownTitleCorrections = new Map([\n  ['tomadachi game', 'Tomodachi Game'],\n])",
          )

          # Add pure validation shared by create and update operations.
          Path('server/media-validation.js').write_text(r'''const mediaTypes = ['movie', 'show', 'anime', 'custom']
          const mediaStatuses = ['Watched', 'Want to Watch', 'Want to Rewatch']

          function fail(message) {
            throw new Error(message)
          }

          function optionalString(value, field) {
            if (value == null) return ''
            if (typeof value !== 'string') fail(`${field} must be a string`)
            return value.trim()
          }

          function stringList(value, field, fallback = []) {
            if (value == null) return [...fallback]
            if (!Array.isArray(value)) fail(`${field} must be an array of strings`)
            return [...new Set(value.map((item) => {
              if (typeof item !== 'string') fail(`${field} must contain only strings`)
              return item.trim()
            }).filter(Boolean))]
          }

          function integer(value, field, { defaultValue, min = Number.MIN_SAFE_INTEGER, max = Number.MAX_SAFE_INTEGER } = {}) {
            if (value == null || value === '') return defaultValue
            const number = Number(value)
            if (!Number.isInteger(number) || number < min || number > max) {
              fail(`${field} must be an integer between ${min} and ${max}`)
            }
            return number
          }

          function number(value, field, { defaultValue, min = -Infinity, max = Infinity } = {}) {
            if (value == null || value === '') return defaultValue
            const parsed = Number(value)
            if (!Number.isFinite(parsed) || parsed < min || parsed > max) {
              fail(`${field} must be a number between ${min} and ${max}`)
            }
            return parsed
          }

          function isoDate(value, field) {
            if (value == null || value === '') return null
            if (typeof value !== 'string' || Number.isNaN(Date.parse(value))) {
              fail(`${field} must be a valid date`)
            }
            return new Date(value).toISOString()
          }

          function releaseYear(value) {
            if (value == null || value === '') return ''
            const year = Number(value)
            const latestYear = new Date().getFullYear() + 10
            if (!Number.isInteger(year) || year < 1878 || year > latestYear) {
              fail(`release_year must be a year between 1878 and ${latestYear}`)
            }
            return String(year)
          }

          function enumValue(value, field, allowed, defaultValue) {
            const resolved = value == null ? defaultValue : value
            if (!allowed.includes(resolved)) fail(`${field} must be one of: ${allowed.join(', ')}`)
            return resolved
          }

          function normalizeMediaPayload(payload, { now = () => new Date().toISOString() } = {}) {
            if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
              fail('Media payload must be an object')
            }

            const title = optionalString(payload.title, 'title')
            if (!title) fail('Title is required')
            if (title.length > 300) fail('title must be 300 characters or fewer')

            const type = enumValue(payload.type, 'type', mediaTypes, 'movie')
            const status = enumValue(payload.status, 'status', mediaStatuses, 'Want to Watch')
            const genres = stringList(payload.genres, 'genres')
            const tags = stringList(payload.tags, 'tags', genres)
            const completedAt = status === 'Watched'
              ? isoDate(payload.completed_at || now(), 'completed_at')
              : null

            return {
              tmdb_id: integer(payload.tmdb_id, 'tmdb_id', { defaultValue: null, min: 1 }),
              title,
              type,
              cover_art: optionalString(payload.cover_art, 'cover_art'),
              genres,
              tags,
              description: optionalString(payload.description, 'description'),
              runtime: integer(payload.runtime, 'runtime', { defaultValue: 0, min: 0, max: 100000 }),
              release_year: releaseYear(payload.release_year),
              tmdb_rating: number(payload.tmdb_rating, 'tmdb_rating', { defaultValue: null, min: 0, max: 10 }),
              status,
              priority: integer(payload.priority, 'priority', { defaultValue: 0, min: 0 }),
              personal_rating: number(payload.personal_rating, 'personal_rating', { defaultValue: null, min: 1, max: 10 }),
              reflection: optionalString(payload.reflection, 'reflection'),
              season: integer(payload.season, 'season', { defaultValue: 1, min: 1 }),
              episode: integer(payload.episode, 'episode', { defaultValue: 0, min: 0 }),
              completed_at: completedAt,
              reminder_at: isoDate(payload.reminder_at, 'reminder_at'),
            }
          }

          export { mediaStatuses, mediaTypes, normalizeMediaPayload }
          '''.replace('          ', ''))

          # Add a recorded, testable one-time maintenance helper.
          Path('server/maintenance.js').write_text(r'''const libraryNormalizationMigrationKey = 'maintenance.library-normalization.v1'

          function runLibraryNormalizationMigration({ db, normalizeLibrary, completedAt = new Date().toISOString() }) {
            const existing = db.prepare('SELECT value FROM settings WHERE key = ?').get(libraryNormalizationMigrationKey)
            if (existing) return false

            normalizeLibrary()
            db.prepare(`
              INSERT INTO settings (key, value) VALUES (?, ?)
              ON CONFLICT(key) DO UPDATE SET value=excluded.value
            `).run(libraryNormalizationMigrationKey, JSON.stringify({ completed_at: completedAt }))
            return true
          }

          export { libraryNormalizationMigrationKey, runLibraryNormalizationMigration }
          '''.replace('          ', ''))

          # Wire validation and the recorded migration into the store.
          replace(
              'server/media-store.js',
              "import { db } from './db.js'\n",
              "import { db } from './db.js'\nimport { runLibraryNormalizationMigration } from './maintenance.js'\nimport { normalizeMediaPayload } from './media-validation.js'\n",
          )
          replace(
              'server/media-store.js',
              "function normalizeExistingLibrary() {\n  repairExistingMedia()\n  dedupeExistingMedia()\n}\n\n\nfunction bindMediaPayload(payload) {\n  const status = payload.status || 'Want to Watch'\n  const completedAt =\n    status === 'Watched' ? payload.completed_at || new Date().toISOString() : null\n\n  return {\n    tmdb_id: payload.tmdb_id || null,\n    title: payload.title?.trim(),\n    type: payload.type || 'movie',\n    cover_art: payload.cover_art || '',\n    genres: JSON.stringify(payload.genres || []),\n    tags: JSON.stringify(payload.tags || payload.genres || []),\n    description: payload.description || '',\n    runtime: payload.runtime || 0,\n    release_year: payload.release_year || '',\n    tmdb_rating: payload.tmdb_rating || null,\n    status,\n    priority: payload.priority || 0,\n    personal_rating: payload.personal_rating || null,\n    reflection: payload.reflection || '',\n    season: payload.season || 1,\n    episode: payload.episode || 0,\n    completed_at: completedAt,\n    reminder_at: payload.reminder_at || null,\n  }\n}",
              "function normalizeExistingLibrary() {\n  repairExistingMedia()\n  dedupeExistingMedia()\n}\n\nfunction runLibraryMaintenanceMigrations() {\n  return runLibraryNormalizationMigration({\n    db,\n    normalizeLibrary: normalizeExistingLibrary,\n  })\n}\n\nfunction bindMediaPayload(payload) {\n  const media = normalizeMediaPayload(payload)\n  return {\n    ...media,\n    genres: JSON.stringify(media.genres),\n    tags: JSON.stringify(media.tags),\n  }\n}",
          )
          replace(
              'server/media-store.js',
              "  normalizeExistingLibrary,\n",
              "  normalizeExistingLibrary,\n  runLibraryMaintenanceMigrations,\n",
          )

          # Make GET /api/media read-only and make PATCH validation errors return 400.
          replace(
              'server/routes/media.js',
              "  mediaRows,\n  normalizeExistingLibrary,\n  rowToMedia,\n",
              "  mediaRows,\n  rowToMedia,\n",
          )
          replace(
              'server/routes/media.js',
              "router.get('/', (_req, res) => {\n  normalizeExistingLibrary()\n  res.json(mediaRows())\n})",
              "router.get('/', (_req, res) => {\n  res.json(mediaRows())\n})",
          )
          old_patch = '''router.patch('/:id', (req, res) => {
            const existing = db.prepare('SELECT * FROM media WHERE id = ?').get(req.params.id)
            if (!existing) return res.status(404).json({ error: 'Media not found' })

            const merged = bindMediaPayload({ ...rowToMedia(existing), ...req.body })
            if (merged.status === 'Watched' && !existing.completed_at) merged.completed_at = new Date().toISOString()
            if (merged.status !== 'Watched') {
              merged.completed_at = null
              merged.personal_rating = null
            }

            db.prepare(`
              UPDATE media SET
                tmdb_id=@tmdb_id, title=@title, type=@type, cover_art=@cover_art, genres=@genres, tags=@tags,
                description=@description, runtime=@runtime, release_year=@release_year, tmdb_rating=@tmdb_rating,
                status=@status, priority=@priority, personal_rating=@personal_rating, reflection=@reflection,
                season=@season, episode=@episode, completed_at=@completed_at, reminder_at=@reminder_at,
                updated_at=CURRENT_TIMESTAMP
              WHERE id=@id
            `).run({ ...merged, id: req.params.id })

            res.json(rowToMedia(db.prepare('SELECT * FROM media WHERE id = ?').get(req.params.id)))
          })'''.replace('          ', '')
          new_patch = '''router.patch('/:id', (req, res) => {
            try {
              const existing = db.prepare('SELECT * FROM media WHERE id = ?').get(req.params.id)
              if (!existing) return res.status(404).json({ error: 'Media not found' })

              const merged = bindMediaPayload({ ...rowToMedia(existing), ...req.body })
              if (merged.status === 'Watched' && !existing.completed_at) merged.completed_at = new Date().toISOString()
              if (merged.status !== 'Watched') {
                merged.completed_at = null
                merged.personal_rating = null
              }

              db.prepare(`
                UPDATE media SET
                  tmdb_id=@tmdb_id, title=@title, type=@type, cover_art=@cover_art, genres=@genres, tags=@tags,
                  description=@description, runtime=@runtime, release_year=@release_year, tmdb_rating=@tmdb_rating,
                  status=@status, priority=@priority, personal_rating=@personal_rating, reflection=@reflection,
                  season=@season, episode=@episode, completed_at=@completed_at, reminder_at=@reminder_at,
                  updated_at=CURRENT_TIMESTAMP
                WHERE id=@id
              `).run({ ...merged, id: req.params.id })

              res.json(rowToMedia(db.prepare('SELECT * FROM media WHERE id = ?').get(req.params.id)))
            } catch (error) {
              res.status(400).json({ error: error.message })
            }
          })'''.replace('          ', '')
          replace('server/routes/media.js', old_patch, new_patch)

          # Run maintenance once at startup, with a persisted completion marker.
          replace(
              'server/index.js',
              "import { mediaIdentityKey, mediaRows, normalizeExistingLibrary, insertMedia, splitTrailingReleaseYear } from './media-store.js'",
              "import { mediaIdentityKey, mediaRows, runLibraryMaintenanceMigrations, insertMedia, splitTrailingReleaseYear } from './media-store.js'",
          )
          replace('server/index.js', 'normalizeExistingLibrary()\n', 'runLibraryMaintenanceMigrations()\n')

          # Update existing correction test and add focused tests.
          replace(
              'tests/known-media.test.js',
              "    expect(applyKnownTitleCorrection('2025 spiderman')).toBe('Superman 2025')",
              "    expect(applyKnownTitleCorrection('2025 spiderman')).toBe('2025 spiderman')\n    expect(applyKnownTitleCorrection('2025 spuierman')).toBe('2025 spuierman')",
          )

          Path('tests/media-validation.test.js').write_text(r'''import { describe, expect, it } from 'vitest'

          import { normalizeMediaPayload } from '../server/media-validation.js'

          describe('normalizeMediaPayload', () => {
            it('normalizes a valid media payload', () => {
              expect(normalizeMediaPayload({
                title: '  Arrival  ',
                type: 'movie',
                status: 'Watched',
                genres: ['Drama', 'Drama', ' Science Fiction '],
                runtime: '116',
                release_year: 2016,
                personal_rating: 9,
                completed_at: '2026-07-10T12:00:00Z',
              })).toMatchObject({
                title: 'Arrival',
                type: 'movie',
                status: 'Watched',
                genres: ['Drama', 'Science Fiction'],
                tags: ['Drama', 'Science Fiction'],
                runtime: 116,
                release_year: '2016',
                personal_rating: 9,
                completed_at: '2026-07-10T12:00:00.000Z',
              })
            })

            it.each([
              [{ title: '' }, 'Title is required'],
              [{ title: 'Test', type: 'podcast' }, 'type must be one of'],
              [{ title: 'Test', status: 'Finished' }, 'status must be one of'],
              [{ title: 'Test', personal_rating: 11 }, 'personal_rating must be a number between 1 and 10'],
              [{ title: 'Test', runtime: -1 }, 'runtime must be an integer'],
              [{ title: 'Test', season: 0 }, 'season must be an integer'],
              [{ title: 'Test', episode: -1 }, 'episode must be an integer'],
              [{ title: 'Test', reminder_at: 'not-a-date' }, 'reminder_at must be a valid date'],
              [{ title: 'Test', genres: 'Drama' }, 'genres must be an array of strings'],
            ])('rejects invalid media data %#', (payload, message) => {
              expect(() => normalizeMediaPayload(payload)).toThrow(message)
            })

            it('does not assign a completion date to an unwatched title', () => {
              expect(normalizeMediaPayload({
                title: 'Future Watch',
                status: 'Want to Watch',
                completed_at: '2026-07-10T12:00:00Z',
              }).completed_at).toBeNull()
            })
          })
          '''.replace('          ', ''))

          Path('tests/maintenance.test.js').write_text(r'''import { describe, expect, it, vi } from 'vitest'

          import {
            libraryNormalizationMigrationKey,
            runLibraryNormalizationMigration,
          } from '../server/maintenance.js'

          function fakeDb(existingValue) {
            const run = vi.fn()
            return {
              run,
              db: {
                prepare(sql) {
                  if (sql.includes('SELECT value')) {
                    return { get: vi.fn(() => existingValue ? { value: existingValue } : undefined) }
                  }
                  return { run }
                },
              },
            }
          }

          describe('runLibraryNormalizationMigration', () => {
            it('runs maintenance and records completion once', () => {
              const { db, run } = fakeDb(null)
              const normalizeLibrary = vi.fn()

              expect(runLibraryNormalizationMigration({
                db,
                normalizeLibrary,
                completedAt: '2026-07-10T12:00:00.000Z',
              })).toBe(true)
              expect(normalizeLibrary).toHaveBeenCalledOnce()
              expect(run).toHaveBeenCalledWith(
                libraryNormalizationMigrationKey,
                JSON.stringify({ completed_at: '2026-07-10T12:00:00.000Z' }),
              )
            })

            it('skips maintenance after the migration is recorded', () => {
              const { db, run } = fakeDb('{"completed_at":"earlier"}')
              const normalizeLibrary = vi.fn()

              expect(runLibraryNormalizationMigration({ db, normalizeLibrary })).toBe(false)
              expect(normalizeLibrary).not.toHaveBeenCalled()
              expect(run).not.toHaveBeenCalled()
            })
          })
          '''.replace('          ', ''))

          # Remove this one-time runner from the resulting branch.
          Path('.github/workflows/apply-data-safety.yml').unlink()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Harden media data handling" || exit 0
          git push origin HEAD:fix/data-safety-validation
