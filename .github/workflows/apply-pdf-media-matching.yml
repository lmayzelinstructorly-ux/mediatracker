                { id: 2, media_type: 'tv', name: 'Dune', first_air_date: '2000-01-01' },
                { id: 3, media_type: 'movie', title: 'Dune', release_date: '2021-01-01' },
              ]

              expect(selectBestTmdbMatch('Dune', results, { preferredType: 'movie', preferredYear: '2021' })?.id).toBe(3)
            })

