name: Apply PDF and media matching improvements

on:
  push:
    branches:
      - improve/pdf-media-matching

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: improve/pdf-media-matching
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply implementation
        run: |
          cat > server/services/media-match.js <<'EOF'
          function normalizeMatchTitle(value) {
            return String(value || '')
              .normalize('NFKD')
              .replace(/[\u0300-\u036f]/g, '')
              .toLowerCase()
              .replace(/[’']/g, '')
              .replace(/&/g, ' and ')
              .replace(/[^a-z0-9]+/g, ' ')
              .replace(/^(?:the|a|an)\s+/, '')
              .replace(/\s+/g, ' ')
              .trim()
          }

          function levenshtein(left, right) {
            const a = normalizeMatchTitle(left)
            const b = normalizeMatchTitle(right)
            if (!a) return b.length
            if (!b) return a.length
            const previous = Array.from({ length: b.length + 1 }, (_, index) => index)
            for (let row = 1; row <= a.length; row += 1) {
              const current = [row]
              for (let column = 1; column <= b.length; column += 1) {
                current[column] = Math.min(
                  current[column - 1] + 1,
                  previous[column] + 1,
                  previous[column - 1] + (a[row - 1] === b[column - 1] ? 0 : 1),
                )
              }
              previous.splice(0, previous.length, ...current)
            }
            return previous[b.length]
          }

          function tokenSimilarity(left, right) {
            const leftTokens = new Set(normalizeMatchTitle(left).split(' ').filter(Boolean))
            const rightTokens = new Set(normalizeMatchTitle(right).split(' ').filter(Boolean))
            if (!leftTokens.size || !rightTokens.size) return 0
            const intersection = [...leftTokens].filter((token) => rightTokens.has(token)).length
            return (2 * intersection) / (leftTokens.size + rightTokens.size)
          }

          function textSimilarity(left, right) {
            const a = normalizeMatchTitle(left)
            const b = normalizeMatchTitle(right)
            if (!a || !b) return 0
            if (a === b) return 1
            const characterScore = 1 - levenshtein(a, b) / Math.max(a.length, b.length)
            const tokenScore = tokenSimilarity(a, b)
            const containmentBonus = a.includes(b) || b.includes(a) ? 0.08 : 0
            return Math.min(1, Math.max(0, characterScore * 0.45 + tokenScore * 0.55 + containmentBonus))
          }

          function candidateTitles(item) {
            return [...new Set([
              item.title,
              item.name,
              item.original_title,
              item.original_name,
            ].map((value) => String(value || '').trim()).filter(Boolean))]
          }

          function candidateYear(item) {
            const date = item.release_date || item.first_air_date || ''
            const year = Number(String(date).slice(0, 4))
            return Number.isInteger(year) ? year : null
          }

          function parseSearchQuery(value) {
            const original = String(value || '').trim()
            let title = original
            let preferredYear = ''
            let preferredType = ''

            for (let pass = 0; pass < 2; pass += 1) {
              const yearMatch = title.match(/\s*(?:\((19\d{2}|20\d{2})\)|\[(19\d{2}|20\d{2})\]|(19\d{2}|20\d{2}))\s*$/)
              if (yearMatch && !preferredYear) {
                preferredYear = yearMatch[1] || yearMatch[2] || yearMatch[3]
                title = title.slice(0, yearMatch.index).trim()
                continue
              }
              const typeMatch = title.match(/\s+(movie|film|tv|show|series|anime)\s*$/i)
              if (typeMatch && !preferredType) {
                const hint = typeMatch[1].toLowerCase()
                preferredType = hint === 'movie' || hint === 'film' ? 'movie' : hint === 'anime' ? 'anime' : 'show'
                title = title.slice(0, typeMatch.index).trim()
              }
            }

            return {
              title: title || original,
              preferredYear,
              preferredType,
            }
          }

          function scoreTmdbCandidate(query, item, { preferredType = '', preferredYear = '' } = {}) {
            const variants = candidateTitles(item)
            const similarities = variants.map((title) => ({
              title,
              similarity: textSimilarity(query, title),
              exact: normalizeMatchTitle(query) === normalizeMatchTitle(title),
            }))
            const bestTitle = similarities.sort((left, right) => right.similarity - left.similarity)[0] || {
              similarity: 0,
              exact: false,
            }
            let score = bestTitle.similarity * 100
            if (bestTitle.exact) score += 28

            if (preferredType === 'movie' || preferredType === 'show') {
              const expected = preferredType === 'show' ? 'tv' : 'movie'
              score += item.media_type === expected ? 32 : -48
            } else if (preferredType === 'anime') {
              const animation = Array.isArray(item.genre_ids) && item.genre_ids.includes(16)
              const japanese = item.original_language === 'ja'
              score += animation ? 18 : -8
              score += japanese ? 12 : 0
            }

            const year = candidateYear(item)
            const requestedYear = Number(preferredYear)
            let yearDifference = null
            if (requestedYear && year) {
              yearDifference = Math.abs(requestedYear - year)
              if (yearDifference === 0) score += 34
              else if (yearDifference === 1) score += 12
              else if (yearDifference === 2) score += 4
              else score -= Math.min(24, yearDifference * 2)
            } else if (requestedYear && !year) {
              score -= 4
            }

            const popularity = Math.max(0, Number(item.popularity) || 0)
            const voteCount = Math.max(0, Number(item.vote_count) || 0)
            score += Math.min(6, Math.log10(popularity + 1) * 2)
            score += Math.min(4, voteCount / 1000)

            return {
              item,
              score,
              similarity: bestTitle.similarity,
              exact: bestTitle.exact,
              yearDifference,
            }
          }

          function rankTmdbResults(query, results, options = {}) {
            return (results || [])
              .filter((item) => ['movie', 'tv'].includes(item.media_type))
              .map((item) => scoreTmdbCandidate(query, item, options))
              .sort((left, right) =>
                right.score - left.score ||
                right.similarity - left.similarity ||
                (Number(right.item.popularity) || 0) - (Number(left.item.popularity) || 0),
              )
          }

          function selectBestTmdbMatch(query, results, options = {}) {
            const ranked = rankTmdbResults(query, results, options)
            const top = ranked[0]
            if (!top || top.similarity < 0.58 || top.score < 62) return null

            const second = ranked[1]
            if (second) {
              const noHints = !options.preferredType && !options.preferredYear
              const crossTypeExactTie = noHints && top.exact && second.exact && top.item.media_type !== second.item.media_type
              if (crossTypeExactTie) return null

              const closeLowConfidenceRace = top.score - second.score < 4 &&
                Math.abs(top.similarity - second.similarity) < 0.06 &&
                !top.exact
              if (closeLowConfidenceRace) return null
            }

            return top.item
          }

          export {
            normalizeMatchTitle,
            parseSearchQuery,
            rankTmdbResults,
            scoreTmdbCandidate,
            selectBestTmdbMatch,
            textSimilarity,
          }
          EOF

          cat > server/services/pdf-watchlist-parser.js <<'EOF'
          const statusHeadings = [
            { status: 'Want to Rewatch', pattern: /^(?:want to rewatch|rewatch(?:list)?|to rewatch)$/i },
            { status: 'Watched', pattern: /^(?:have watched|already watched|watched|completed|finished|done)$/i },
            { status: 'Want to Watch', pattern: /^(?:planning to watch|plan to watch|want to watch|to watch|watchlist|movies? to watch|shows? to watch|anime to watch)$/i },
          ]

          function uniqueList(items) {
            return [...new Set(items.map((item) => String(item || '').trim()).filter(Boolean))]
          }

          function normalizeEvidence(value) {
            return String(value || '')
              .normalize('NFKD')
              .replace(/[\u0300-\u036f]/g, '')
              .toLowerCase()
              .replace(/&/g, ' and ')
              .replace(/[^a-z0-9]+/g, ' ')
              .replace(/\s+/g, ' ')
              .trim()
          }

          function normalizeImportedStatus(value, fallback = 'Want to Watch') {
            const text = String(value || '').toLowerCase()
            if (/\b(?:rewatch|watch again)\b/.test(text)) return 'Want to Rewatch'
            if (/\b(?:watched|completed|complete|finished|done)\b/.test(text) && !/\b(?:not|un)watched\b/.test(text)) return 'Watched'
            if (/\b(?:want to watch|to watch|watchlist|planning to watch|plan to watch)\b/.test(text)) return 'Want to Watch'
            return fallback
          }

          function normalizeImportedType(value, fallback = 'custom') {
            const text = String(value || '').toLowerCase()
            if (/\banime\b/.test(text)) return 'anime'
            if (/\b(?:tv|show|series|season)\b/.test(text)) return 'show'
            if (/\b(?:movie|film)\b/.test(text)) return 'movie'
            return fallback
          }

          function headingStatus(line) {
            const normalized = String(line || '')
              .trim()
              .replace(/^[#=_\-–—\s]+|[#=_\-–—:\s]+$/g, '')
            return statusHeadings.find(({ pattern }) => pattern.test(normalized))?.status || null
          }

          function stripListMarker(line) {
            let text = String(line || '').trim()
            let starred = false
            const starMatch = text.match(/^[★⭐]\s*/u)
            if (starMatch) {
              starred = true
              text = text.slice(starMatch[0].length)
            }

            const numbered = text.match(/^(\d{1,3})[.)]\s+/)
            if (numbered) {
              return { text: text.slice(numbered[0].length), listed: true, rank: Number(numbered[1]), starred }
            }

            const marker = text.match(/^(?:[A-Za-z][.)]|[-*+•●▪◦‣∙]|\[\s*(?:x|X|✓| )?\s*\]|☐|☑|✓|✔)\s+/u)
            if (marker) return { text: text.slice(marker[0].length), listed: true, rank: null, starred }
            return { text, listed: false, rank: null, starred }
          }

          function isMetadataToken(value) {
            const token = String(value || '').trim()
            return /^(?:19\d{2}|20\d{2})$/.test(token) ||
              /^(?:movie|film|tv|show|series|anime|watched|completed|finished|done|rewatch|want to watch|to watch)$/i.test(token) ||
              /\b(?:recommended|watch with|watch after|watch before|later|soon|priority|favorite|favourite|rating|maybe)\b/i.test(token)
          }

          function splitPdfTitleAndNote(value) {
            let source = String(value || '').replace(/\r/g, '').trim()
            if (!source) return { title: '', notes: '', type: 'custom', status: null, release_year: '' }

            const metadata = []
            const columns = source.split(/\s*\|\s*|\t+/).map((part) => part.trim()).filter(Boolean)
            if (columns.length > 1) {
              source = columns.shift()
              metadata.push(...columns)
            }

            const separator = source.match(/\s+(?:--|—|–)\s+|\s+-\s+(?=(?:watch|rewatch|watched|movie|film|show|tv|series|anime|recommended|with|after|before|later|soon|priority|rating|favorite|favourite)\b)/i)
            if (separator?.index > 0) {
              metadata.unshift(source.slice(separator.index + separator[0].length).trim())
              source = source.slice(0, separator.index).trim()
            }

            source = source.replace(/\s*[[(]([^\])]+)[\])]\s*/g, (match, token) => {
              if (!isMetadataToken(token)) return match
              metadata.push(token.trim())
              return ' '
            })

            const rating = source.match(/\s+((?:\d(?:\.\d)?|10)\s*\/\s*10)\s*$/i)
            if (rating) {
              metadata.push(`rating ${rating[1]}`)
              source = source.slice(0, rating.index).trim()
            }

            const metadataText = metadata.join(' / ')
            const releaseYear = metadataText.match(/\b(19\d{2}|20\d{2})\b/)?.[1] || ''
            const detectedStatus = normalizeImportedStatus(metadataText, null)
            const detectedType = normalizeImportedType(metadataText, 'custom')
            const notes = metadata.filter((part) => !/^(?:19\d{2}|20\d{2}|movie|film|tv|show|series|anime|watched|completed|finished|done|rewatch|want to watch|to watch)$/i.test(part.trim()))

            const title = source
              .replace(/^["“”']+|["“”']+$/g, '')
              .replace(/\s+/g, ' ')
              .trim()

            return {
              title,
              notes: uniqueList(notes).join(' / '),
              type: detectedType,
              status: detectedStatus,
              release_year: releaseYear,
            }
          }

          function isNoiseLine(line) {
            const text = String(line || '').trim()
            if (!text) return true
            if (/^--\s*\d+\s+of\s+\d+\s*--$/i.test(text)) return true
            if (/^(?:page\s*)?\d+(?:\s*(?:\/|of)\s*\d+)?$/i.test(text)) return true
            if (/^(?:https?:\/\/|www\.)/i.test(text) || /\S+@\S+\.\S+/.test(text)) return true
            if (/^(?:generated|exported|created|updated)\s+(?:on|at)\b/i.test(text)) return true
            if (/^(?:19\d{2}|20\d{2})[-/.](?:0?[1-9]|1[0-2])[-/.](?:0?[1-9]|[12]\d|3[01])$/.test(text)) return true

            const words = normalizeEvidence(text).split(' ').filter(Boolean)
            const headerWords = new Set(['title', 'name', 'year', 'type', 'status', 'rating', 'priority', 'notes', 'note'])
            if (words.length > 0 && words.every((word) => headerWords.has(word))) return true
            return false
          }

          function parseWatchlistLines(text) {
            let currentStatus = 'Want to Watch'
            let sectionActive = false
            let priority = 1000
            const items = []
            const seen = new Set()

            for (const rawLine of String(text || '').split('\n')) {
              const line = rawLine.trim()
              const status = headingStatus(line)
              if (status) {
                currentStatus = status
                sectionActive = true
                continue
              }

              const marker = stripListMarker(line)
              if (!marker.listed && !sectionActive) continue
              if (isNoiseLine(marker.text)) continue
              if (!marker.listed) {
                const wordCount = normalizeEvidence(marker.text).split(' ').filter(Boolean).length
                if (marker.text.length > 140 || wordCount > 18 || /[.!?]$/.test(marker.text)) continue
              }

              const parsed = splitPdfTitleAndNote(marker.text)
              if (!parsed.title || parsed.title.length > 300) continue
              const itemStatus = parsed.status || currentStatus
              const itemType = parsed.type || 'custom'
              const key = [normalizeEvidence(parsed.title), itemType, itemStatus, parsed.release_year].join('|')
              if (!normalizeEvidence(parsed.title) || seen.has(key)) continue
              seen.add(key)

              const rankedPriority = marker.rank ? Math.max(1, 1001 - marker.rank) : priority--
              items.push({
                title: parsed.title,
                type: itemType,
                status: itemStatus,
                release_year: parsed.release_year,
                priority: rankedPriority + (marker.starred ? 100 : 0),
                tags: ['PDF import'],
                notes: parsed.notes,
              })
            }

            return items
          }

          function itemSimilarity(left, right) {
            const leftTokens = new Set(normalizeEvidence(left).split(' ').filter(Boolean))
            const rightTokens = new Set(normalizeEvidence(right).split(' ').filter(Boolean))
            if (!leftTokens.size || !rightTokens.size) return 0
            const intersection = [...leftTokens].filter((token) => rightTokens.has(token)).length
            return (2 * intersection) / (leftTokens.size + rightTokens.size)
          }

          function mergeExtractedItems({ text, aiItems = [], fallbackItems = [] }) {
            const normalizedText = normalizeEvidence(text)
            const fallback = fallbackItems.filter((item) => item?.title)
            const usedFallback = new Set()
            const merged = []

            for (const aiItem of aiItems.filter((item) => item?.title)) {
              const aiTitle = String(aiItem.title).trim()
              const evidenceKey = normalizeEvidence(aiTitle)
              const closestIndex = fallback
                .map((item, index) => ({ index, similarity: itemSimilarity(aiTitle, item.title) }))
                .sort((left, right) => right.similarity - left.similarity)[0]
              const groundedByFallback = closestIndex?.similarity >= 0.72
              const groundedByText = evidenceKey.length >= 3 && normalizedText.includes(evidenceKey)
              if (!groundedByFallback && !groundedByText) continue

              const fallbackItem = groundedByFallback ? fallback[closestIndex.index] : null
              if (fallbackItem) usedFallback.add(closestIndex.index)
              merged.push({
                ...fallbackItem,
                ...aiItem,
                title: aiTitle,
                type: normalizeImportedType(aiItem.type, fallbackItem?.type || 'custom'),
                status: fallbackItem?.status || normalizeImportedStatus(aiItem.status),
                release_year: String(aiItem.release_year || fallbackItem?.release_year || ''),
                priority: Math.max(Number(aiItem.priority) || 0, Number(fallbackItem?.priority) || 0),
                tags: uniqueList([...(fallbackItem?.tags || []), ...(Array.isArray(aiItem.tags) ? aiItem.tags : [])]),
                notes: uniqueList([fallbackItem?.notes, aiItem.notes]).join(' / '),
              })
            }

            fallback.forEach((item, index) => {
              if (!usedFallback.has(index)) merged.push(item)
            })

            const seen = new Set()
            return merged.filter((item) => {
              const key = [normalizeEvidence(item.title), item.type || 'custom', item.status || 'Want to Watch', item.release_year || ''].join('|')
              if (seen.has(key)) return false
              seen.add(key)
              return true
            })
          }

          export {
            mergeExtractedItems,
            normalizeImportedStatus,
            normalizeImportedType,
            parseWatchlistLines,
            splitPdfTitleAndNote,
          }
          EOF

          cat > server/services/tmdb.js <<'EOF'
          import {
            parseSearchQuery,
            rankTmdbResults,
            selectBestTmdbMatch,
          } from './media-match.js'

          export function createTmdbService({ tmdbKey, tmdbToken, posterBase }) {
            async function tmdbFetch(url) {
              const headers = tmdbToken ? { Authorization: `Bearer ${tmdbToken}` } : {}
              const keyParam = tmdbKey ? `${url.includes('?') ? '&' : '?'}api_key=${tmdbKey}` : ''
              const response = await fetch(`${url}${keyParam}`, { headers })
              if (!response.ok) {
                const text = await response.text()
                throw new Error(`TMDB request failed: ${response.status} ${text}`)
              }
              return response.json()
            }

            function tmdbMediaType(sourceType) {
              return sourceType === 'tv' ? 'show' : 'movie'
            }

            function mapTmdbResult(item, sourceType) {
              const title = item.title || item.name || item.original_title || item.original_name
              const date = item.release_date || item.first_air_date || ''
              return {
                tmdb_id: item.id,
                title,
                type: tmdbMediaType(sourceType),
                cover_art: item.poster_path ? `${posterBase}${item.poster_path}` : '',
                description: item.overview || '',
                release_year: date ? date.slice(0, 4) : '',
                tmdb_rating: item.vote_average ? Number(item.vote_average.toFixed(1)) : null,
                genres: [],
                tags: [],
                runtime: 0,
              }
            }

            async function hydrateTmdb(item, sourceType) {
              const detailType = sourceType === 'tv' ? 'tv' : 'movie'
              const detail = await tmdbFetch(`https://api.themoviedb.org/3/${detailType}/${item.tmdb_id}?language=en-US`)
              const genres = (detail.genres || []).map((genre) => genre.name)
              return {
                ...item,
                genres,
                tags: genres,
                runtime:
                  detail.runtime ||
                  (Array.isArray(detail.episode_run_time) ? detail.episode_run_time[0] : 0) ||
                  0,
              }
            }

            async function findBestTmdb(title, type, preferredYear = '') {
              try {
                const hints = parseSearchQuery(title)
                const query = hints.title
                const effectiveType = type === 'custom' ? hints.preferredType || '' : type
                const effectiveYear = preferredYear || hints.preferredYear
                const data = await tmdbFetch(`https://api.themoviedb.org/3/search/multi?language=en-US&include_adult=false&query=${encodeURIComponent(query)}`)
                const match = selectBestTmdbMatch(query, data.results, {
                  preferredType: effectiveType,
                  preferredYear: effectiveYear,
                })
                if (!match) return null
                const normalized = mapTmdbResult(match, match.media_type)
                return hydrateTmdb(normalized, match.media_type)
              } catch {
                return null
              }
            }

            return {
              findBestTmdb,
              hydrateTmdb,
              mapTmdbResult,
              parseSearchQuery,
              rankTmdbResults,
              tmdbFetch,
              tmdbMediaType,
            }
          }
          EOF

          cat > server/routes/search.js <<'EOF'
          import { Router } from 'express'
          import { e2eTmdbFixtureResults, useE2eTmdbFixtures } from '../e2e-fixtures.js'
          import { applyKnownTitleCorrection } from '../known-media.js'

          export function createSearchRouter({ hydrateTmdb, mapTmdbResult, parseSearchQuery, rankTmdbResults, tmdbFetch }) {
            const router = Router()
            router.get('/tmdb', async (req, res) => {
              try {
                const correctedQuery = applyKnownTitleCorrection(String(req.query.q || '').trim())
                if (!correctedQuery) return res.json([])
                if (useE2eTmdbFixtures) return res.json(e2eTmdbFixtureResults)

                const hints = parseSearchQuery(correctedQuery)
                const data = await tmdbFetch(`https://api.themoviedb.org/3/search/multi?language=en-US&include_adult=false&query=${encodeURIComponent(hints.title)}`)
                const ranked = rankTmdbResults(hints.title, data.results, {
                  preferredType: hints.preferredType,
                  preferredYear: hints.preferredYear,
                })
                const items = ranked
                  .slice(0, 8)
                  .map(({ item }) => mapTmdbResult(item, item.media_type))
                const hydrated = await Promise.all(items.slice(0, 5).map((item) => hydrateTmdb(item, item.type === 'show' ? 'tv' : 'movie')))
                res.json(hydrated.concat(items.slice(5)))
              } catch (error) {
                res.status(500).json({ error: error.message })
              }
            })
            return router
          }
          EOF

          python <<'PY'
          from pathlib import Path
          import re

          path = Path('server/services/pdf-import.js')
          text = path.read_text()
          text = text.replace(
              "import { PDFParse } from 'pdf-parse'\n",
              "import { PDFParse } from 'pdf-parse'\nimport {\n  mergeExtractedItems,\n  normalizeImportedStatus as inferImportedStatus,\n  normalizeImportedType as inferImportedType,\n  parseWatchlistLines as parseStructuredWatchlistLines,\n  splitPdfTitleAndNote as splitStructuredTitleAndNote,\n} from './pdf-watchlist-parser.js'\n",
          )
          text = re.sub(
              r"function splitPdfTitleAndNote\(value\) \{.*?\n\}\n\nasync function extractPdfText",
              "function splitPdfTitleAndNote(value) {\n  return splitStructuredTitleAndNote(value)\n}\n\nasync function extractPdfText",
              text,
              count=1,
              flags=re.S,
          )
          text = re.sub(
              r"function parseWatchlistLines\(text\) \{.*?\n\}\n\nfunction normalizeImportedStatus\(status\) \{.*?\n\}\n\nfunction normalizeImportedType\(type\) \{.*?\n\}",
              "function parseWatchlistLines(text) {\n  return parseStructuredWatchlistLines(text)\n}\n\nfunction normalizeImportedStatus(status) {\n  return inferImportedStatus(status)\n}\n\nfunction normalizeImportedType(type) {\n  return inferImportedType(type)\n}",
              text,
              count=1,
              flags=re.S,
          )
          text = text.replace(
              'Schema: [{"title":"string","type":"movie|show|anime|custom","status":"Watched|Want to Watch|Want to Rewatch","priority":1-100,"tags":["string"],"notes":"string"}]',
              'Schema: [{"title":"string","type":"movie|show|anime|custom","status":"Watched|Want to Watch|Want to Rewatch","release_year":"YYYY or blank","priority":1-100,"tags":["string"],"notes":"string"}]',
          )
          text = text.replace(
              '- Infer type and status when possible. Default status is "Want to Watch".',
              '- Treat nearby year, type, and status labels as metadata. Put years in release_year instead of title.\n- Infer type and status only from evidence in the PDF. Keep type custom when movie versus show is unclear. Default status is "Want to Watch".\n- Do not choose a similarly named title, sequel, remake, movie, or show just because it is popular. Preserve the PDF wording when uncertain.\n- Every title must be grounded in the PDF text, except individual installments expanded from an explicitly named collection.',
          )
          old = """        if (aiInterpreted.items.length > 0) {
          interpreted = aiInterpreted
        }"""
          new = """        if (aiInterpreted.items.length > 0) {
          interpreted = {
            ...aiInterpreted,
            items: mergeExtractedItems({
              text,
              aiItems: aiInterpreted.items,
              fallbackItems,
            }),
          }
        }"""
          if old not in text:
              raise SystemExit('AI merge block not found')
          text = text.replace(old, new, 1)
          text = text.replace(
              "      const type = normalizeImportedType(rawItem.type)\n      const status = normalizeImportedStatus(rawItem.status)",
              "      const type = normalizeImportedType([rawItem.type, rawItem.notes].filter(Boolean).join(' '))\n      const status = normalizeImportedStatus([rawItem.status, rawItem.notes].filter(Boolean).join(' '))",
              1,
          )
          text = text.replace(
              "      candidates.push({ rawItem: { ...rawItem, notes }, title, preferredYear: titleParts.year, type, status, index })",
              "      candidates.push({\n        rawItem: { ...rawItem, notes },\n        title,\n        preferredYear: String(rawItem.release_year || titleParts.year || ''),\n        type,\n        status,\n        index,\n      })",
              1,
          )
          path.write_text(text)
          PY

