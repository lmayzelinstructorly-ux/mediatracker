name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run static checks, unit tests, and build
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        id: e2e
        continue-on-error: true
        run: npm run test:e2e -- --reporter=line > playwright-debug.log 2>&1

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-debug-log
          path: playwright-debug.log

      - name: Fail when end-to-end tests fail
        if: steps.e2e.outcome == 'failure'
        run: exit 1
