name: Debug PDF review

on:
  push:
    branches:
      - feature/pdf-review-workflow

permissions:
  contents: read

jobs:
  debug-playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - id: tests
        continue-on-error: true
        run: npx playwright test --reporter=line > playwright-debug.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: playwright-debug-log
          path: playwright-debug.log
      - if: steps.tests.outcome == 'failure'
        run: exit 1
