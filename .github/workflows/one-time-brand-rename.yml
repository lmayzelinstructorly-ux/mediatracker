name: One-time MediaTracker brand rename

on:
  push:
    branches:
      - fix/brand-mediatracker-20260709

permissions:
  contents: write

jobs:
  rename-brand:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/brand-mediatracker-20260709

      - name: Replace old visible brand references
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          matches = subprocess.check_output(
              ['git', 'grep', '-Il', '-e', 'FrameLog', '-e', 'framelog-backup']
          ).decode().splitlines()

          for filename in matches:
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              updated = text.replace('FrameLog', 'MediaTracker').replace(
                  'framelog-backup', 'mediatracker-backup'
              )
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
          PY

          rm .github/workflows/one-time-brand-rename.yml

      - name: Commit brand correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore MediaTracker branding"
          git push
