name: Refactor app and server

on:
  push:
    branches: [refactor/split-app-server]

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Split frontend and backend modules
        run: node scripts/refactor-app-server.mjs

      - name: Run static checks, unit tests, and build
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Commit verified refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Split frontend and backend into focused modules"
          git push
